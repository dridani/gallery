baseURL = 'https://example.org/'
locale = 'en-us'
copyright = "© 2026 DRIDANI"
defaultContentLanguage = "en"
disableKinds = ["taxonomy"]
enableRobotsTXT = true
languageCode = "en"
timeZone = "Europe/Berlin"
timeout = "120s"
title = "DRIDANI GALLERY"

[params]
  defaultTheme = "dark"
  description = "Example site for hugo-theme-gallery"
  title = "My Gallery"
  [params.author]
    email = "donyridani29@gmail.com"
    name = "Dony Ridani"
  [params.socialIcons]
    facebook = "https://www.facebook.com/donyridani"
    instagram = "https://www.instagram.com/dony.ridani"
    github = "https://github.com/dridani"
    email = "mailto:donyridani29@gmail.com"
    #youtube = "https://www.youtube.com/"
    #website = "https://example.com"
    #mastodon = "https://example.com"
    #pixelfed = "https://example.com"
    #mixcloud = "https://example.com"
    #flickr = "https://www.flickr.com"
    #500px = "https://500px"
    #whatsapp = "1234567890"
  [params.gallery]
    #boxSpacing = 10
    #targetRowHeight = 288
    #targetRowHeightTolerance = 0.25

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]

[imaging]
  quality = 75
  resampleFilter = "CatmullRom"
  [imaging.exif]
    disableDate = false
    disableLatLong = true
    includeFields = "ImageDescription|Orientation"

[module]
  [[module.imports]]
    path = "github.com/nicokaiser/hugo-theme-gallery/v4"

[menu]
  #[[menu.footer]]
  #  name = "GitHub"
  #  url = "https://github.com/nicokaiser/hugo-theme-gallery/"
  #  weight = 3

[services]
  [services.rss]
    limit = 100
